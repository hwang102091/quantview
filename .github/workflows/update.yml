name: 데이터 자동 갱신

# 매일 한국시간 오전 8시(UTC 23:00) + 미국 장 마감 후(UTC 21:30, 한국시간 06:30)에 실행
on:
  schedule:
    - cron: "0 23 * * 1-5"   # 평일 오전 8시 KST (한국 장 시작 전)
    - cron: "30 21 * * 1-5"  # 평일 미국 장 마감 직후
  workflow_dispatch:          # 수동 실행 허용
  push:
    branches: [ main ]
    paths:
      - "collectors/**"
      - "processors/**"
      - "universe/**"
      - "run.py"
      - "config.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 데이터 수집·분석 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python run.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "chore(data): 자동 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
